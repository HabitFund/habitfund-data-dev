name: Sync Google Sheets to JSON
on:
  # schedule:
  #   - cron: '0 * * * *' # 매 시간마다 자동 실행
  workflow_dispatch:      # 필요할 때 수동 실행 버튼 활성화
  repository_dispatch:    # Google Apps Script에서 트리거
    types: [sheets-updated]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run update script
        env:
            GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
            SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python update_contributions.py
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add contributors/*.json
          git commit -m "Auto-update contributors from Google Sheets" || exit 0
          git push